<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SenzSHOP · Toko Kecil</title>
  <!-- Font Orbiton & Icon -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- CSS Eksternal -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone-frame" id="phoneFrame">
  <div class="app-screen" id="appScreen">

    <!-- HALAMAN LOGIN/DAFTAR (default aktif) -->
    <div id="loginPage" class="login-container">
      <div style="margin-top: 40px; text-align: center;">
        <i class="fas fa-cube" style="font-size: 56px; color: #0b5ed7; background: white; padding: 20px; border-radius: 40px; box-shadow: 0 20px 30px #0b5ed740;"></i>
        <h1 style="font-weight: 800; margin: 20px 0 10px; font-size: 32px; background: linear-gradient(145deg, #0b2545, #0b5ed7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SenzSHOP</h1>
        <p style="margin-bottom: 36px;">belanja modern · biru & putih</p>
      </div>
      <div style="display: flex; gap: 10px; margin-bottom: 28px;">
        <button class="btn-primary" id="showLoginTab" style="background: #0b2545;">Masuk</button>
        <button class="btn-outline" id="showRegisterTab">Daftar</button>
      </div>

      <!-- form login -->
      <div id="loginForm">
        <input type="text" class="input-glass" placeholder="Username" id="loginUser" value="senz"><br><br>
        <input type="password" class="input-glass" placeholder="Password" id="loginPass" value="123"><br><br>
        <button class="btn-primary" id="loginBtn">Masuk ke SenzSHOP</button>
        <p style="text-align: center; margin-top: 24px;" class="text-small">demo: user bebas / isi asal</p>
      </div>

      <!-- form register sederhana -->
      <div id="registerForm" style="display: none;">
        <input type="text" class="input-glass" placeholder="Nama lengkap" id="regName" value="Pengguna Baru"><br><br>
        <input type="text" class="input-glass" placeholder="Username" id="regUser" value="baru"><br><br>
        <input type="password" class="input-glass" placeholder="Password" id="regPass" value="123"><br><br>
        <button class="btn-primary" id="registerBtn">Daftar & Login</button>
      </div>
    </div>

    <!-- DASHBOARD (halaman utama setelah login) -->
    <div id="dashboardPage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromDashboard" style="visibility: hidden;"><i class="fas fa-arrow-left"></i></div>
        <h2>🛍️ SenzSHOP</h2>
        <div style="flex:1"></div>
      </div>
      <div style="margin-bottom: 20px; background: #0b5ed710; padding: 18px; border-radius: 32px;">
        <span style="font-weight:500">Halo, <span id="displayName">User</span> 👋</span>
        <h3 style="font-weight:800; margin-top: 8px;">Temukan Produk Pilihan</h3>
      </div>

      <!-- grid produk dinamis dari JS -->
      <div class="product-grid" id="productList"></div>
    </div>

    <!-- DETAIL PRODUK + KERANJANG/BELI (seperti shopee) -->
    <div id="detailPage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromDetail"><i class="fas fa-arrow-left"></i></div>
        <h2>Detail Produk</h2>
      </div>
      <div id="detailContainer"></div>
    </div>

    <!-- KONFIRMASI PEMBELIAN (sebelum ke telegram) -->
    <div id="confirmPage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromConfirm"><i class="fas fa-arrow-left"></i></div>
        <h2>Konfirmasi</h2>
      </div>
      <div id="confirmContainer"></div>
    </div>

    <!-- KERANJANG -->
    <div id="cartPage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromCart"><i class="fas fa-arrow-left"></i></div>
        <h2>🛒 Keranjang</h2>
      </div>
      <div id="cartList"></div>
    </div>

    <!-- PESANAN (riwayat) -->
    <div id="orderPage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromOrder"><i class="fas fa-arrow-left"></i></div>
        <h2>📦 Pesanan</h2>
      </div>
      <div id="orderList"></div>
    </div>

    <!-- PROFILE -->
    <div id="profilePage" class="page">
      <div class="header-bar">
        <div class="back-btn" id="backFromProfile"><i class="fas fa-arrow-left"></i></div>
        <h2>Profil Saya</h2>
      </div>
      <div style="text-align: center;">
        <img src="https://files.catbox.moe/w0dzhg.jpg" class="profile-pic" id="profileImg" alt="foto profil">
        <div style="background: white; border-radius: 30px; padding: 20px;">
          <p><strong>Nama</strong></p>
          <input type="text" class="input-glass" id="profileNameInput" value="Senz User">
          <button class="btn-primary" id="updateProfileBtn" style="margin-top: 16px;">Simpan perubahan</button>
          <button class="btn-outline" id="logoutBtn" style="margin-top: 12px; width:100%;">Keluar</button>
        </div>
      </div>
    </div>

  </div> <!-- app-screen -->

  <!-- BOTTOM NAVIGATION (muncul hanya saat login) -->
  <div class="bottom-nav" id="bottomNav" style="display: none;">
    <div class="nav-item" data-page="dashboard"><i class="fas fa-home"></i><span>Dashboard</span></div>
    <div class="nav-item" data-page="cart"><i class="fas fa-shopping-cart"></i><span>Keranjang</span></div>
    <div class="nav-item" data-page="order"><i class="fas fa-clipboard-list"></i><span>Pesanan</span></div>
    <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
  </div>
</div>

<!-- JavaScript Eksternal -->
<script src="script.js"></script>
</body>
</html>
